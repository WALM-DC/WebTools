    <div class="masterDiv">
        <div class="addVKP">
            <button id="addVKP" class="pushable">
                <span class="front">+ VKP</span>
            </button>
            <button id="removeAll" class="pushable">
                <span class="front">Alles zur&uuml;cksetzen</span>
            </button> 
        </div>
        <div>
            <div class="resultDiv lowerDiv">

            </div>
        </div>

<script>
    injectTabs();

    var vkpsAdded = 1, index = 1;
    var storedVKPs = localStorage.getItem('vkpsAdded');
    var storedTablesData = (localStorage.getItem('tablesData')!=='')?JSON.parse(localStorage.getItem('tablesData')):'';

    function addAmountToLocalStorage(){
        localStorage.setItem('vkpsAdded', vkpsAdded);
    }
    function addDataToLocalStorage(){
        var tablesData = [], activeContainers = $(`[finder='tableContainer']`);
        $.each(activeContainers, function(i, container){
            let tableData = [], findNumber = $(container).attr('finderNumber');
            tableData.push($(`[finder='ekp${findNumber}']`).val());
            tableData.push($(`[finder='kaa${findNumber}']`).val());
            tableData.push($(`[finder='entlastung${findNumber}']`).val());
            tableData.push($(`[finder='aktion${findNumber}']`).val());
            tablesData.push(tableData);
        });
        localStorage.setItem('tablesData', JSON.stringify(tablesData));
    }
    function calculateVKP(finderNumber){
        let ekp = parseFloat($(`[finder='ekp${finderNumber}']`).val()) || 0;
        let kaa = parseFloat($(`[finder='kaa${finderNumber}']`).val()) || 0;
        let entlastung = parseFloat($(`[finder='entlastung${finderNumber}']`).val()) || 0;
        let aktion = parseFloat($(`[finder='aktion${finderNumber}']`).val()) || 0;
        let entlastungCalc = (100-entlastung)/100;
        let aktionCalc = (100-aktion)/100;
        let ekpCalc = ekp/100;
        let kaaCalc = kaa/100;

        let vkp = ekpCalc*kaaCalc*entlastungCalc*aktionCalc;
        let ekEntlastung = ekpCalc*kaaCalc*entlastungCalc;
        let ekAktion = ekpCalc*kaaCalc*aktionCalc;

        let aktionCalcDisplay = ((ekEntlastung - ekAktion) * 100) / ekEntlastung;

        $(`[finder='vkp${finderNumber}']`).val(vkp.toFixed(2));
        $(`[finder='vkpround${finderNumber}']`).val(Math.round(vkp));
        $(`[finder='aktioncalc${finderNumber}']`).val(aktionCalcDisplay.toFixed(2));
        addDataToLocalStorage();
    }

    function injectTables(){
        for (index; index <= vkpsAdded; index++) {
            $('.resultDiv').append(`
                <div finder="tableContainer" finderNumber="${index}" id="tableContainer${index}"><div id="removeBtn${index}" class="removeBtn" onclick="removeTable(${index})">X</div><table class="calcTable" id="calcTable${index}">
                        <tbody>
                            <tr>
                                <td>EKP:</td>
                                <td><input type="number" finder="ekp${index}" finderNumber="${index}" placeholder="1701"></td>
                            </tr>
                            <tr>
                                <td>kaa1:</td>
                                <td><input type="number" finder="kaa${index}" finderNumber="${index}" placeholder="350"></td>
                            </tr>
                            <tr>
                                <td>Entlastung:</td>
                                <td><input type="number" finder="entlastung${index}" finderNumber="${index}" placeholder="30"></td>
                            </tr>
                            <tr>
                                <td>Aktion:</td>
                                <td><input type="number" finder="aktion${index}" finderNumber="${index}" placeholder="33"></td>
                            </tr>
                            <tr>
                                <td></td>
                                <td></td>
                            </tr>
                            <tr>
                                <td>VKP:</td>
                                <td><input type="text" finder="vkp${index}" disabled></td>
                            </tr>
                            <tr>
                                <td>VKP gerundet:</td>
                                <td><input type="text" finder="vkpround${index}" disabled></td>
                            </tr>
                            <tr>
                                <td>Aktionsberechnung:</td>
                                <td><input type="text" finder="aktioncalc${index}" disabled></td>
                            </tr>
                        </tbody>
                    </table></div>
            `);
        }
        addAmountToLocalStorage();
    }
    function innitPage(){
        if(storedVKPs && storedVKPs > vkpsAdded){
            vkpsAdded = parseInt(storedVKPs);
        }
        injectTables();
        if(storedTablesData && storedTablesData.length > 0){
            for (let i = 0; i < storedTablesData.length; i++){
                let tableData = storedTablesData[i];
                if(tableData[0] != '' && tableData[0] != null){
                    $(`[finder='ekp${i+1}']`).val(tableData[0]);
                    $(`[finder='kaa${i+1}']`).val(tableData[1]);
                    $(`[finder='entlastung${i+1}']`).val(tableData[2]);
                    $(`[finder='aktion${i+1}']`).val(tableData[3]);
                    calculateVKP(i+1);
                }
            }
        }
    }
    $('#addVKP').click(function(){
        vkpsAdded++;
        injectTables();
    });
    $('#removeAll').click(function(){
        vkpsAdded = 1, index = 1;
        $('.resultDiv').empty();
        localStorage.setItem('tablesData', '');
        injectTables();
    });
    $('body').on('input', 'input[type="number"]', function(){
        calculateVKP($(this).attr('finderNumber'));
    });
    function removeTable(index){
        $('#tableContainer' + index).remove();
        vkpsAdded--, index--;
        injectTables();
    }
    
    innitPage();
</script>
</html>

<html>
<head>
    <title>3D-Modell&uuml;bersicht</title>
    <link rel="stylesheet" href="data/mattStyle.css">
    <script src="https://walm-dc.github.io/WebTools/public/jquery-3.7.1.min.js"></script>
    <script src="https://walm-dc.github.io/WebTools/public/table2csv.js"></script>
    <script src="https://walm-dc.github.io/WebTools/public/ddtf.js"></script>
    <script src="data/mattQuery.js"></script>
    <style>
        .loading {
            background-image: url(loading.gif);
            background-repeat: no-repeat;
            min-height: 600px;
            background-position: center;
            background-size: 600px auto;
        }
        button{
            width: 210px;
            margin-left: 14px;
        }
        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .kkBmli {
            font-weight: bold;
        }
        .l1Highlither {
            color: #ff0000;
        }
        #refreshTimer{
            position: absolute;
            left: 10px;
            color: white;
        }
        #refreshNow{
            cursor: pointer;
            background-color: darkorange;
            padding: 5px 5px;
            border-radius: 5px;
            margin-left: 10px;
            margin-top: 10px;
            line-height: 50px;
            color: black;
        }
        #refreshNow .refresherIcon{
            filter: none;
            width: 16px;
            height: 16px;
            margin-top: -15px;
            vertical-align: middle;
        }
        .div_before_table {
            height: calc(100% - 220px);
        }
        @media(max-width: 1710px){
            .div_before_table {
                height: calc(100% - 235px);
            }
        }
        @media(max-width: 1248px){
            .div_before_table {
                height: calc(100% - 250px);
            }
        }
    </style>
</head>
<body>
    <div id="topDiv"></div>
    <div class="masterDiv">
        <!-- <div class="topDiv">
            <h2>3D-Modell&uuml;bersicht</h2>
        </div> -->
        <div>
            <div class="resultDiv">
                <div id="refreshTimer"><span id="refreshNow">Daten aktualisieren <img src="refresh-button.png" class="emptySearch refresherIcon"></span></div>
                <h3>Anzahl der gefilterten Artikel: <span id="myCounter"></span></h3>
                <h3>Anzahl der Varianten / Absprungpunkte: <span id="myVariantCounter"></span></h3>
                <h3 class="withButton">CSV Export: 
                    <button id="exportAll" class="pushable">
                        <span class="front">Alle Daten</span>
                    </button>
                    <button id="exportFiltered" class="pushable">
                        <span class="front">Gefilterte Daten</span>
                    </button>
                </h3>
                <img src="refresh-button.png" class="emptySearch" title="Suche leeren" alt="Suche leeren"><input type="text" id="myInput" placeholder="Allgemeine Suche auf alle Felder...">
                <div class="div_before_table loading">
                    <table id="myTable" cellspacing="0" cellpadding="0">
                        <tr>
                            <th>Hersteller</th>
                            <th>Marke</th>
                            <th>Modellname</th>
                            <th>3D Domain</th>
                            <th>Nummer</th>
                            <th>Schiene</th>
                            <th>Land</th>
                            <th>Herkunft</th>
                            <th>Online</th>
                            <th>Konfig.</th>
                            <th>Var. Konfig.</th>
                            <th>KkBm 1L</th>
                            <th>KkBm & Varianten</th>
                            <th>W&auml;hrung</th>
                            <th>kaa1</th>
                            <th>entlastung</th>
                            <th>aktion</th>
                            <th>Beschreibung</th>
                            <th>Warengruppe</th>
                        </tr>
                    </table>
                </div>
            </div>    
        </div>
    </div>
</body>
<script>
    injectTabs();

    var masterData = [];
    var intern = 0, extern = 0, today = new Date().getFullYear() + '' + (new Date().getMonth() + 1) + '' + new Date().getDate();
    var combinedRegistry = [];
    var countryShorts = {
        "LU": "xxxlutz",
        "MM": "moemax",
        "MX": "moebelix"
    }
    function sortList(a, b) {
        let ca = a.catalog.split('.')[0].replace('XXXL', '').toLowerCase();
        let cb = b.catalog.split('.')[0].replace('XXXL', '').toLowerCase();
        let ba = a.brandName.toLowerCase();
        let bb = b.brandName.toLowerCase();
        let ma = a.modelName.toLowerCase();
        let mb = b.modelName.toLowerCase();
        if(ca !== cb) return (ca < cb) ? -1 : 1;
        if(ba !== bb) return (ba < bb) ? -1 : 1;
        return (ma < mb) ? -1 : 1;
    }
    function countColumns(){
        $('#myCounter').html(($('table tr').length-1)-($('table tr[style="display: none;"]').length));
        var allVarantCount = 0, inactiveVariantCount = 0;
        $.each($('table tr'),function(id, val){
            if(typeof($(val).attr('variants'))!='undefined'){
                allVarantCount += parseInt($(val).attr('variants'));
            }
        })
        $.each($('table tr[style="display: none;"]'),function(id, val){
            if(typeof($(val).attr('variants'))!='undefined'){
                inactiveVariantCount += parseInt($(val).attr('variants'));
            }
        })
        $('#myVariantCounter').html(allVarantCount-inactiveVariantCount);
    }
    $('#myInput').on('keydown', function(e) {
        if (e.which === 13) { // Check if the Enter key is pressed (key code 13)
            if($(this).val() === ""){
                removeHighlights();
                $('#myTable tr').show();
            } else {
                filterTable();
            }
        }
    });
    $('.emptySearch').on('click', function(){
        $('#myInput').val('');
        removeHighlights();
        $('#myTable tr').show();
        countColumns();
    });
    // docu for plugin: https://www.jqueryscript.net/table/jQuery-Plugin-To-Export-Table-Data-To-CSV-File-table2csv.html
    $('#exportAll').on('click',function(){
        $("table").table2csv({  
            filename:'3D-Modellliste.csv',
            separator: ';',
            newline: '\n',
            quoteFields: false,
            trimContent: true,
            excludeHidden: false          
        });
    })
    $('#exportFiltered').on('click',function(){
        $("table").table2csv({
            filename:'3D-Modellliste-gefiltert.csv',
            separator: ';',
            newline: '\n',
            quoteFields: false,
            trimContent: true,
            excludeHidden: true
        });
    })
    function fillResultTable(entry){
        $('#myTable').append(
            '<tr><td>'+entry.catalog.split('.')[0].replace('XXXL', '')+'</td>'+
            '<td>'+entry.brandName+'</td>'+
            '<td>'+entry.modelName+'</td>'+
            '<td>'+entry.catalog+'</td>'+
            '<td><a href="https://'+entry.storeUrl+'/s/?s='+entry.productNumber+'" target="_blank">'+entry.productNumber+'</a></td>'+
            '<td>'+entry.brand+'</td>'+
            '<td>'+entry.locale+'</td>'+
            '<td class="'+entry.inOrEx+'">'+entry.inOrEx+'</td>'+
            entry.online+
            entry.konfig+
            '<td>'+entry.konfigVariantLinks+'</td>'+
            // '<td>'+entry.productVariants+'</td>'+
            entry.kkbmTable+
            '<td><ul>'+entry.auslaufVarianten+'</ul></td>'+
            '<td>'+entry.currency+'</td>'+
            '<td>'+entry.preis+'</td>'+
            '<td>'+entry.entlastung+'</td>'+
            '<td>'+entry.aktion+'</td>'+
            '<td>'+entry.description+'</td>'+
            '<td>'+entry.productGroup+'</td></tr>'
        )
    }
    function readAndShowJSON(){
        $.getJSON( "list.json", function( data ) {
            var sortArray = $.map(data, function(value, index) {return [value]});
            sortArray.sort(sortList);
            $.each(sortArray, function(id, val){
                var storeUrl = countryShorts[val.brand]+'.'+val.locale;
                if(countryShorts[val.brand] === 'xxxlutz' && val.locale === 'si'){
                    storeUrl = 'xxxlesnina'+'.'+val.locale;
                }                
                var inOrEx = 'Intern';
                if(val.catalog.split('.')[0].indexOf('XXXL')>-1){
                    intern++;
                } else {
                    extern++;
                    inOrEx = 'Extern';
                }
                var online = '<td class="trueCol">Ja</td>';
                if(!val.online){online = '<td class="falseCol">Nein</td>'}
                if(val.online===''){online = '<td></td>'}

                var konfig = '<td class="trueCol">Ja</td>';
                if(!val.konfig){konfig = '<td class="falseCol">Nein</td>'}
                if(val.konfig===''){konfig = '<td></td>'}

                let konfigVariantLinks = '';
                const variantConfig = (val.variantConfig || '').trim();
                if (variantConfig) {
                    konfigVariantLinks = variantConfig
                        .split('/')
                        .map(item => item.trim())
                        .filter(Boolean)
                        .sort((a, b) => {
                            const numA = parseInt(a.replace(/\D/g, ''), 10) || 0;
                            const numB = parseInt(b.replace(/\D/g, ''), 10) || 0;
                            return numA - numB;
                        })
                        .map(item => `<a href="https://${storeUrl}/s/?s=${val.productNumber}${item}" target="_blank">${item}</a>`)
                        .join('/ ');
                }
                var auslaufVarianten = '', KkBmL1 = false, kkbmTable = '<td></td>';
                var list1L = '', listRef = '', listRest = '';
                $.each(val.KkBm, function(index, value){
                    var isL1 = '', kkBmRef = index.trim();
                    var tempList = value.sort((a, b) => {
                        const numA = parseInt(a.replace(/\D/g, ''), 10) || 0;
                        const numB = parseInt(b.replace(/\D/g, ''), 10) || 0;
                        return numA - numB;
                    });
                    if(kkBmRef === '1L'){
                        isL1 = 'l1Highlither';
                        if(!KkBmL1){
                            kkbmTable = '<td class="falseCol">1L</td>'; 
                            KkBmL1 = true;
                        }
                        list1L += '<li><span class="kkBmli l1Highlither">' + kkBmRef + '</span>: ' + tempList.join('/ ') + '</li>';
                    } else if(kkBmRef === ''){
                        kkBmRef = 'REF';
                        listRef += '<li><span class="kkBmli">' + kkBmRef + '</span>: ' + tempList.join('/ ') + '</li>';
                    } else {
                        listRest += '<li><span class="kkBmli">' + kkBmRef + '</span>: ' + tempList.join('/ ') + '</li>';
                    }
                })
                auslaufVarianten += list1L + listRest + listRef;
                var entry = {
                    catalog: val.catalog,
                    brandName: val.brandName,
                    modelName: val.modelName,
                    inOrEx: inOrEx,
                    storeUrl: storeUrl,
                    productNumber: val.productNumber,
                    online: online,
                    konfig: konfig,
                    konfigVariantLinks: konfigVariantLinks,
                    kkbmTable: kkbmTable,
                    auslaufVarianten: auslaufVarianten,
                    brand: val.brand,
                    locale: val.locale,
                    currency: val.currency,
                    preis: val.preis,
                    entlastung: val.entlastung,
                    aktion: val.aktion,
                    description: val.description,
                    productGroup: val.productGroup
                }
                masterData.push(entry);
                fillResultTable(entry);
            })
            // filterTable();
            $('.loading').removeClass('loading');
            countColumns()
            jQuery('#myTable').ddTableFilter();
            localStorage.setItem('lastUpdateModel', new Date().getFullYear() + '' + (new Date().getMonth() + 1) + '' + new Date().getDate());
            localStorage.setItem('dataTableModel', JSON.stringify(masterData));
        });
    }
    $('#refreshNow').on('click', function(){
        localStorage.setItem('lastUpdateModel', null);
        localStorage.setItem('dataTableModel', null);
        window.location.reload(true);
    });
    function checkLocalStorage(){
        var lastUpdate = localStorage.getItem('lastUpdateModel');
        if(lastUpdate == today && localStorage.getItem('dataTableModel') !== null){
            masterData = JSON.parse(localStorage.getItem('dataTableModel'));
            $.each(masterData, function(id, val){
                fillResultTable(val);
            })
            countColumns();
            jQuery('#myTable').ddTableFilter();
        } else {
            readAndShowJSON();    
        }
    }
    checkLocalStorage();
</script>
</html>
